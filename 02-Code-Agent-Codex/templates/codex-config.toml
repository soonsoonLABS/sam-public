# Managed by sam-codex. This file lives in ~/.codex-sam/config.toml.
# Keep the user's regular Codex configuration in ~/.codex unchanged.

model = "azure.gpt-5.6-terra"
model_provider = "sam"
service_tier = "default"

# SAM MCP provides search, page reading, and account usage.
# Provider-hosted Codex search is deliberately disabled.
web_search = "disabled"

[model_providers.sam]
name = "SAM"
base_url = "https://sam.soonsoon.ai/v2/openai"
env_key = "SAM_CODEX_API"
wire_api = "responses"

[mcp_servers.sam-tools]
url = "https://sam.soonsoon.ai/mcp"
bearer_token_env_var = "SAM_CODEX_API"
